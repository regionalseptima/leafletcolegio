<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A House That Cares About The Future</title>
    <style>
        :root {
            --bg-canvas: #0f172a;
            --paper-sheet: #ffffff;
            --notebook-blue: #cbd5e1;
            --notebook-pink: #fca5a5;
            
            /* Sketch Palette Colors */
            --house-yellow: #fde047;
            --roof-red: #f87171;
            --door-brown: #78350f;
            --pipe-blue: #3b82f6;
            --text-green: #16a34a;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-canvas);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            overflow: hidden;
            perspective: 2500px;
        }

        /* Top Menu Bar Controls */
        .controls-bar {
            margin-bottom: 35px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .action-btn {
            background-color: #ffffff;
            color: #0f172a;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.15);
            background-color: #f8fafc;
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        /* Leaflet Structural Wrapper Setup */
        .leaflet-box {
            width: 900px;
            height: 550px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            transition: transform 0.5s ease;
        }

        /* Foldable Leaflet Panels (Three Sections) */
        .fold-panel {
            width: 300px;
            height: 100%;
            position: absolute;
            top: 0;
            background-color: var(--paper-sheet);
            /* Crisp High-Res Lined Notebook Paper Generation */
            background-image: 
                linear-gradient(90deg, transparent 45px, var(--notebook-pink) 45px, var(--notebook-pink) 47px, transparent 47px),
                linear-gradient(var(--notebook-blue) 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Precise Leaflet Segment Positioning */
        .fold-panel.left-segment {
            left: 0;
            transform-origin: right center;
            z-index: 5;
            border-right: 1px solid rgba(0,0,0,0.06);
            border-radius: 4px 0 0 4px;
        }

        .fold-panel.center-segment {
            left: 300px;
            z-index: 1;
        }

        .fold-panel.right-segment {
            left: 600px;
            transform-origin: left center;
            z-index: 6;
            border-left: 1px solid rgba(0,0,0,0.06);
            border-radius: 0 4px 4px 0;
        }

        /* 3D Physical Folding Keyframe States */
        .leaflet-box.is-closed .left-segment {
            transform: rotateY(180deg);
            z-index: 15;
        }

        .leaflet-box.is-closed .right-segment {
            transform: rotateY(-180deg);
            z-index: 16;
        }

        /* Dual Side Content Mapping Containers */
        .face-view {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            box-sizing: border-box;
        }

        /* Mirror Front Faces so text reads correctly when closed */
        .left-segment .face-view.front-cover {
            transform: rotateY(180deg);
        }

        .right-segment .face-view.front-cover {
            transform: rotateY(-180deg);
        }

        /* CRITICAL FIXED RULE: Hide opposite faces completely based on fold state to prevent layout text bleed through */
        .leaflet-box.is-closed .face-view.inside-spread {
            opacity: 0 !important;
            visibility: hidden;
        }

        .leaflet-box:not(.is-closed) .face-view.front-cover {
            opacity: 0 !important;
            visibility: hidden;
        }

        /* Typography Styles replicating Hand-drawn text layouts */
        .text-dark-title {
            font-size: 2.3rem;
            color: var(--text-dark);
            line-height: 1.2;
            margin-top: 25px;
            font-weight: bold;
        }

        .text-green-accent {
            font-size: 3.6rem;
            color: var(--text-green);
            font-weight: normal;
            margin: 5px 0;
        }

        .text-annotation-note {
            font-size: 1.15rem;
            color: #14532d;
            line-height: 1.4;
            font-weight: bold;
        }

        /* Completely Self-contained Art Vectors Layer */
        .master-svg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 900px;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="controls-bar">
        <button class="action-btn" onclick="openBrochure()">Unfold Open View</button>
        <button class="action-btn" onclick="closeBrochure()">Fold Closed Cover</button>
    </div>

    <div class="leaflet-box is-closed" id="leafletStructure">
        
        <div class="fold-panel left-segment">
            <div class="face-view front-cover" style="padding-top: 60px; padding-left: 25px;">
                <div class="text-dark-title" style="font-size: 2.8rem; margin-bottom: 5px;">An</div>
                <div class="text-green-accent" style="font-size: 3.1rem; color: var(--text-dark);">eco-friendly</div>
                <div class="text-dark-title" style="font-size: 2.4rem; margin-top: 5px;">Place ...</div>
            </div>
            <div class="face-view inside-spread"></div>
        </div>

        <div class="fold-panel center-segment">
            <div class="face-view front-cover"></div>
            <div class="face-view inside-spread"></div>
        </div>

        <div class="fold-panel right-segment">
            <div class="face-view front-cover" style="padding-left: 30px;">
                <div class="text-dark-title">A house that</div>
                <div class="text-green-accent">CARES</div>
                <div class="text-dark-title" style="margin-top: 0;">about the</div>
                <div class="text-green-accent" style="font-size: 3.4rem;">Future</div>
            </div>
            <div class="face-view inside-spread" style="transition: opacity 0.3s;">
                <div class="text-annotation-note" style="position: absolute; top: 65px; left: 15px; width: 240px;">
                    When it rains, it collects the water
                </div>
                <div class="text-annotation-note" style="position: absolute; bottom: 85px; left: 15px; width: 250px;">
                    that water is used in the bathroom and to wash dishes
                </div>
            </div>
        </div>

        <svg class="master-svg-canvas" id="houseVectorLayer" viewBox="0 0 900 550">
            <path d="M340,65 Q355,45 370,60 Q385,45 400,60 Q415,45 430,60 L430,75 L340,75 Z" fill="#3a86c8" stroke="#000000" stroke-width="2" />
            <line x1="360" y1="88" x2="360" y2="105" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" />
            <line x1="385" y1="88" x2="385" y2="105" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" />
            <line x1="410" y1="88" x2="410" y2="105" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" />

            <polygon points="100,180 275,120 450,180" fill="var(--roof-red)" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" />
            <polygon points="450,180 540,120 540,180" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" />
            
            <rect x="290" y="132" width="55" height="30" fill="none" stroke="#000000" stroke-width="2" transform="rotate(11, 290, 132)" />
            <line x1="318" y1="133" x2="324" y2="162" stroke="#000000" stroke-width="2" />
            <rect x="360" y="146" width="55" height="30" fill="none" stroke="#000000" stroke-width="2" transform="rotate(11, 360, 146)" />
            <line x1="388" y1="147" x2="394" y2="176" stroke="#000000" stroke-width="2" />

            <rect x="110" y="180" width="180" height="270" fill="var(--house-yellow)" stroke="#000000" stroke-width="2.5" />
            <rect x="155" y="315" width="85" height="135" fill="var(--door-brown)" stroke="#000000" stroke-width="2.5" />
            <circle cx="225" cy="385" r="4.5" fill="#fef08a" />

            <rect x="290" y="180" width="250" height="270" fill="none" stroke="#000000" stroke-width="2.5" />
            <line x1="410" y1="180" x2="410" y2="450" stroke="#000000" stroke-width="2.5" />
            <line x1="50" y1="450" x2="650" y2="450" stroke="#000000" stroke-width="3" stroke-linecap="round" />

            <path d="M385,165 L405,165 L405,200 L555,200 L555,475" fill="none" stroke="var(--pipe-blue)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M385,165 L405,165 L405,200 L555,200 L555,475" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

            <path d="M555,475 L390,475" fill="none" stroke="var(--pipe-blue)" stroke-width="12" stroke-linejoin="round" />
            <path d="M555,475 L390,475" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" />

            <path d="M390,475 L390,425 L340,425 L340,360" fill="none" stroke="var(--pipe-blue)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
            <path d="M390,475 L390,425 L340,425 L340,360" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />

            <path d="M465,475 L465,425" fill="none" stroke="var(--pipe-blue)" stroke-width="12" stroke-linecap="round" />
            <path d="M465,475 L465,425" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" />

            <rect x="300" y="360" width="85" height="50" fill="none" stroke="#000000" stroke-width="2" />
            <path d="M315,360 L315,338 Q325,328 330,338" fill="none" stroke="#000000" stroke-width="2" /> 
            <line x1="342" y1="360" x2="342" y2="410" stroke="#000000" stroke-width="1.5" />
            <circle cx="328" cy="385" r="3.5" fill="none" stroke="#000000" stroke-width="1.5" />
            <circle cx="356" cy="385" r="3.5" fill="none" stroke="#000000" stroke-width="1.5" />

            <rect x="430" y="320" width="22" height="45" fill="none" stroke="#000000" stroke-width="2" /> 
            <ellipse cx="485" cy="365" rx="20" ry="12" fill="none" stroke="#000000" stroke-width="2" /> 
            <rect x="452" y="350" width="25" height="15" fill="none" stroke="#000000" stroke-width="2" />
            <ellipse cx="485" cy="365" rx="12" ry="5" fill="none" stroke="var(--pipe-blue)" stroke-width="2.5" />

            <path d="M555,195 L620,115" fill="none" stroke="var(--text-green)" stroke-width="2" stroke-linecap="round" />
            <polygon points="620,115 611,117 616,124" fill="var(--text-green)" />

            <path d="M510,475 L620,445" fill="none" stroke="var(--text-green)" stroke-width="2" stroke-linecap="round" />
            <polygon points="620,445 611,443 614,451" fill="var(--text-green)" />
        </svg>

    </div>

    <script>
        const leafletStructure = document.getElementById('leafletStructure');
        const houseVectorLayer = document.getElementById('houseVectorLayer');

        // Dynamic State Operational Engine
        function openBrochure() {
            leafletStructure.classList.remove('is-closed');
            // Brings the layout diagram into full visibility when opened
            houseVectorLayer.style.opacity = "1";
        }

        function closeBrochure() {
            leafletStructure.classList.add('is-closed');
            // Fades the interior vector blueprint path layers to ensure zero clipping with outer cover texts
            houseVectorLayer.style.opacity = "0";
        }

        // Initialize state configuration defaults
        houseVectorLayer.style.opacity = "0";
    </script>
</body>
</html>
