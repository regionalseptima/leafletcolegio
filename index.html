<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PalmImport</title>
<style>

\*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{

&#x20; --p:#BA6B82;--pd:#9E5A6F;--pl:#E8C4D0;--pp:#F7E9EE;--ppu:#FDF5F7;

&#x20; --w:#FFF;--td:#3D2E34;--tm:#6B5560;--tl:#9B8790;--bg:#FFFAFB;

&#x20; --wa:#25D366;--er:#E53935;--erl:#FFEBEE;--su:#2E7D32;--sul:#E8F5E9;

&#x20; --or:#E65100;--orl:#FFF3E0;--bl:#1565C0;--bll:#E3F2FD;

&#x20; --sh:0 2px 12px rgba(0,0,0,.07);--shl:0 8px 30px rgba(0,0,0,.1);

&#x20; --r:16px;--rs:10px;--tr:all .25s cubic-bezier(.4,0,.2,1);

}

html{scroll-behavior:smooth}

body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--td);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}



/\* ===== LOGO ===== \*/

.logo-wrap{display:flex;align-items:center;gap:0;user-select:none}

.logo-palm{position:relative;display:inline-block;width:28px;height:36px}

.logo-palm svg{width:100%;height:100%}

.logo-text{font-weight:800;font-size:22px;color:var(--p);letter-spacing:-1px;line-height:1}



/\* ===== HEADER ===== \*/

.hdr{background:rgba(255,255,255,.97);border-bottom:1px solid var(--pp);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

.hdr-in{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}

.hdr-r{display:flex;align-items:center;gap:10px}

.badge{background:var(--pp);color:var(--pd);padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}

.cart-btn{position:relative;background:var(--p);color:#fff;border:none;border-radius:12px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:var(--tr)}

.cart-btn:active{transform:scale(.95)}

.cart-cnt{background:#fff;color:var(--p);border-radius:50%;width:20px;height:20px;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:800;position:absolute;top:-6px;right:-6px}

.cart-cnt.show{display:flex}

.cart-cnt.bump{animation:bump .3s ease}

@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}



/\* ===== HERO ===== \*/

.hero{background:linear-gradient(135deg,var(--p) 0%,var(--pd) 100%);color:#fff;text-align:center;padding:48px 16px 38px;position:relative;overflow:hidden}

.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}

.hero::after{content:'';position:absolute;bottom:-30%;left:-15%;width:250px;height:250px;background:rgba(255,255,255,.04);border-radius:50%;pointer-events:none}

.hero h1{font-size:30px;font-weight:700;margin-bottom:8px;position:relative}

.hero p{font-size:14px;opacity:.9;max-width:380px;margin:0 auto;position:relative}



/\* ===== NAV ===== \*/

.cnav{background:var(--w);border-bottom:1px solid var(--pp);position:sticky;top:58px;z-index:99}

.cnav-in{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto}

.cnav-in::-webkit-scrollbar{display:none}

.nb{flex:1;min-width:max-content;padding:13px 16px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--tm);cursor:pointer;position:relative;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;transition:color .2s}

.nb:active{opacity:.7}

.nb.act{color:var(--p)}

.nb.act::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2.5px;background:var(--p);border-radius:2px 2px 0 0}



/\* ===== MAIN ===== \*/

.mn{max-width:1100px;margin:0 auto;padding:16px;padding-bottom:100px}



/\* ===== SECTIONS ===== \*/

.sec{display:none}.sec.v{display:block;animation:fu .35s ease}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}



.sh{background:var(--w);border-radius:var(--r);padding:22px 18px;margin-bottom:14px;border:1px solid var(--pp);box-shadow:var(--sh)}

.sh h2{font-size:22px;font-weight:700;color:var(--pd);margin-bottom:4px}

.sh .sub{font-size:12px;color:var(--tl);margin-bottom:14px}

.pr-row{display:flex;flex-wrap:wrap;gap:6px}

.pr-c{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700}

.pr-c.cl{background:var(--pp);color:var(--pd)}.pr-c.sh{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);color:#8D6E63}

.pr-c.li{background:linear-gradient(135deg,#F3E5F5,#E1BEE7);color:#6A1B9A}.pr-c.va{background:linear-gradient(135deg,#E0F2F1,#B2DFDB);color:#00695C}



/\* ===== SUB SECTION ===== \*/

.ss{background:var(--w);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--pp);box-shadow:var(--sh)}

.ss-h{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--pp);flex-wrap:wrap}

.ss-i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

.ss-i.cl{background:var(--pp)}.ss-i.sh{background:linear-gradient(135deg,#FFF3E0,#FFE0B2)}.ss-i.li{background:linear-gradient(135deg,#F3E5F5,#E1BEE7)}.ss-i.va{background:linear-gradient(135deg,#E0F2F1,#B2DFDB)}

.ss-t{font-size:15px;font-weight:700}

.ss-p{font-size:11px;color:var(--p);font-weight:700;margin-left:auto;background:var(--ppu);padding:3px 10px;border-radius:6px;white-space:nowrap}



/\* ===== PRODUCT GRID ===== \*/

.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

@media(min-width:500px){.pg{grid-template-columns:repeat(3,1fr)}}

@media(min-width:800px){.pg{grid-template-columns:repeat(4,1fr)}}



.pc{padding:12px 10px;border-radius:12px;background:var(--ppu);display:flex;align-items:center;gap:10px;transition:var(--tr);border:2px solid transparent;cursor:pointer;user-select:none;position:relative;min-height:54px}

.pc:hover{border-color:var(--pl);background:var(--pp)}

.pc:active{transform:scale(.97)}

.pc.ic{background:var(--pp);border-color:var(--p)}

.pc-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--pl);flex-shrink:0}

.pd{width:8px;height:8px;border-radius:50%;background:var(--p);flex-shrink:0;opacity:.4}

.pc.ic .pd{opacity:1}

.pn{font-size:12px;font-weight:500;line-height:1.3;flex:1}

.pf{font-size:13px;flex-shrink:0}

.add-btn{width:30px;height:30px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:var(--tr);line-height:1}

.add-btn:active{transform:scale(.85);background:var(--pd)}

.pc.ic .add-btn{background:var(--pd);font-size:13px}



/\* ===== SECTION FOOTER ===== \*/

.sf{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--pp)}

.sb{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}

.sb.op{background:var(--sul);color:var(--su)}.sb.cl2{background:var(--orl);color:var(--or)}.sb.ls{background:var(--erl);color:var(--er)}



/\* ===== GLOSS SPECIAL ===== \*/

.gs{background:linear-gradient(135deg,var(--p),var(--pd));border-radius:var(--r);padding:30px 18px;color:#fff;text-align:center;margin-bottom:14px;box-shadow:var(--shl);position:relative;overflow:hidden}

.gs::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%}

.gb{display:inline-block;background:rgba(255,255,255,.2);padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}

.gs h2{font-size:26px;margin-bottom:6px}

.gs p{font-size:13px;opacity:.9}

.gp{font-size:34px;font-weight:800;margin:14px 0 4px}

.gpo{font-size:15px;text-decoration:line-through;opacity:.6}



/\* ===== CART SIDEBAR ===== \*/

.co{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}

.co.o{opacity:1;pointer-events:all}

.cs{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:400px;background:var(--w);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-6px 0 30px rgba(0,0,0,.12)}

.cs.o{transform:translateX(0)}

.cs-top{padding:18px 20px;border-bottom:1px solid var(--pp);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.cs-top h3{font-size:19px;font-weight:700;color:var(--pd)}

.cs-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tm);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}

.cs-x:hover{background:var(--pp)}

.cs-items{flex:1;overflow-y:auto;padding:14px 20px;-webkit-overflow-scrolling:touch}

.cs-empty{text-align:center;padding:40px 16px;color:var(--tl)}

.cs-empty .ei{font-size:44px;margin-bottom:10px;opacity:.4}

.cs-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--ppu);margin-bottom:8px;transition:background .2s}

.cs-item:hover{background:var(--pp)}

.cs-item-in{flex:1;min-width:0}

.cs-item-n{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cs-item-c{font-size:10px;color:var(--tl);margin-top:2px}

.cs-item-p{font-size:13.5px;font-weight:700;color:var(--p);white-space:nowrap}

.cs-item-q{display:flex;align-items:center;gap:6px}

.qb{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--pl);background:var(--w);cursor:pointer;font-size:16px;font-weight:600;color:var(--p);display:flex;align-items:center;justify-content:center;transition:var(--tr)}

.qb:active{background:var(--pp);transform:scale(.9)}

.qn{font-size:14px;font-weight:700;min-width:18px;text-align:center}

.cs-item-r{background:none;border:none;color:var(--tl);cursor:pointer;font-size:17px;padding:4px;transition:color .2s}

.cs-item-r:hover{color:var(--er)}

.cs-bot{padding:18px 20px;border-top:1px solid var(--pp);flex-shrink:0;background:var(--w)}

.cs-tot{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:15px;font-weight:700}

.cs-tot .ta{font-size:22px;color:var(--p)}

.wa-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--wa);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:var(--tr)}

.wa-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}

.wa-btn:active{transform:scale(.98)}

.cl-btn{width:100%;padding:10px;border:none;border-radius:10px;background:var(--erl);color:var(--er);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;transition:background .2s}

.cl-btn:hover{background:#FFCDD2}



/\* ===== FOOTER ===== \*/

.ftr{text-align:center;padding:30px 16px 100px;color:var(--tl);font-size:11px}



/\* ===== WA FLOAT ===== \*/

.wf{position:fixed;bottom:20px;right:16px;z-index:99;animation:bi .5s ease .8s both}

@keyframes bi{0%{opacity:0;transform:scale(.5) translateY(16px)}60%{transform:scale(1.1) translateY(-3px)}100%{opacity:1;transform:scale(1) translateY(0)}}

.wl{background:var(--w);padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;box-shadow:var(--sh);white-space:nowrap;margin-bottom:6px;text-align:center}

.wb{width:54px;height:54px;border-radius:50%;background:var(--wa);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.35);text-decoration:none;animation:pu 2s infinite;margin:0 auto}

@keyframes pu{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.35)}50%{box-shadow:0 4px 20px rgba(37,211,102,.35),0 0 0 12px rgba(37,211,102,.1)}}

.wb svg{width:28px;height:28px;fill:#fff}



/\* ===== TOAST ===== \*/

.tc{position:fixed;top:70px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:calc(100vw - 24px)}

.tst{background:var(--w);border-radius:12px;padding:11px 16px;box-shadow:var(--shl);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;animation:si .3s ease;border-left:4px solid var(--p);pointer-events:auto}

.tst.su{border-left-color:var(--su)}.tst.er{border-left-color:var(--er)}

@keyframes si{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}



/\* ===== ADMIN APP ===== \*/

.admin-app{display:none;min-height:100vh;background:var(--bg)}

.admin-app.v{display:block}



/\* Admin Login \*/

.adm-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--p),var(--pd));padding:20px}

.login-card{background:var(--w);border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:var(--shl);text-align:center}

.login-card .logo-area{margin-bottom:28px}

.login-card h2{font-size:22px;font-weight:700;color:var(--pd);margin-bottom:6px}

.login-card .login-sub{font-size:13px;color:var(--tl);margin-bottom:28px}

.login-error{background:var(--erl);color:var(--er);padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:18px;display:none}



/\* Form Elements \*/

.fg{margin-bottom:16px;text-align:left}

.fg label{display:block;font-size:11px;font-weight:700;color:var(--tm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}

.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:2px solid var(--pp);border-radius:10px;font-family:inherit;font-size:14px;color:var(--td);transition:var(--tr);background:var(--ppu);-webkit-appearance:none}

.fg input:focus,.fg select:focus{outline:none;border-color:var(--p);background:var(--w);box-shadow:0 0 0 3px rgba(186,107,130,.15)}



.btn{padding:12px 20px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}

.btn:active{transform:scale(.97)}

.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}

.btn-s{background:none;border:2px solid var(--pp);color:var(--tm)}.btn-s:hover{border-color:var(--p);color:var(--p)}

.btn-d{background:var(--er);color:#fff}.btn-d:hover{filter:brightness(1.1)}

.btn-w{background:var(--wa);color:#fff}.btn-w:hover{filter:brightness(1.08)}

.btn-bl{background:var(--bl);color:#fff}.btn-bl:hover{filter:brightness(1.1)}

.btn-sm{padding:8px 14px;font-size:12px;border-radius:9px}

.btn-full{width:100%}



/\* Admin Dashboard \*/

.adm-dash{display:none;min-height:100vh}.adm-dash.v{display:block}

.adh{background:var(--w);border-bottom:1px solid var(--pp);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}

.adh-r{display:flex;align-items:center;gap:12px}

.ub{font-size:11px;color:var(--tm);font-weight:600}

.alb{padding:6px 14px;border:2px solid var(--pp);border-radius:8px;background:none;font-family:inherit;font-size:11px;font-weight:700;color:var(--tm);cursor:pointer;transition:var(--tr)}

.alb:hover{border-color:var(--er);color:var(--er)}



.atn{background:var(--w);border-bottom:1px solid var(--pp);overflow-x:auto}.atn::-webkit-scrollbar{display:none}

.atn-in{max-width:1100px;margin:0 auto;display:flex}

.at{flex:1;min-width:max-content;padding:13px 16px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:700;color:var(--tm);cursor:pointer;position:relative;white-space:nowrap;transition:color .2s;text-transform:uppercase;letter-spacing:.3px}

.at:hover{color:var(--p)}

.at.act{color:var(--p)}

.at.act::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2.5px;background:var(--p);border-radius:2px 2px 0 0}



.amn{max-width:1100px;margin:0 auto;padding:16px}

.as{display:none}.as.v{display:block;animation:fu .3s ease}



.ac{background:var(--w);border-radius:var(--r);padding:22px 18px;margin-bottom:14px;border:1px solid var(--pp);box-shadow:var(--sh)}

.ac h3{font-size:20px;font-weight:700;color:var(--pd);margin-bottom:4px}

.ac .as2{font-size:12px;color:var(--tl);margin-bottom:18px}



/\* Admin Product List \*/

.apl{display:flex;flex-direction:column;gap:6px}

.api{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--ppu);border:1px solid transparent;transition:var(--tr)}

.api:hover{border-color:var(--pl);background:var(--pp)}

.api-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--pl);flex-shrink:0}

.api-ph{width:44px;height:44px;border-radius:10px;background:var(--pp);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}

.api-in{flex:1;min-width:0}

.api-n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.api-c{font-size:10px;color:var(--tl);margin-top:2px}

.api-pr{font-size:14px;font-weight:700;color:var(--p);white-space:nowrap;margin-right:8px}

.api-act{display:flex;gap:5px;flex-shrink:0}

.ab{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}

.ab.ei{background:var(--pp);color:var(--p)}.ab.ei:hover{background:var(--p);color:#fff}

.ab.di{background:var(--erl);color:var(--er)}.ab.di:hover{background:var(--er);color:#fff}

.ab.ii{background:#E3F2FD;color:var(--bl)}.ab.ii:hover{background:var(--bl);color:#fff}

.ab.fe{background:var(--orl);color:var(--or)}.ab.fe:hover{background:var(--or);color:#fff}



/\* Search \*/

.sr{position:relative;margin-bottom:14px}

.sr::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

.sb2{width:100%;padding:10px 14px 10px 38px;border:2px solid var(--pp);border-radius:10px;font-family:inherit;font-size:13px;background:var(--ppu);transition:var(--tr)}

.sb2:focus{outline:none;border-color:var(--p);background:var(--w);box-shadow:0 0 0 3px rgba(186,107,130,.15)}



/\* Upload Area \*/

.ua{border:2px dashed var(--pl);border-radius:14px;padding:32px 16px;text-align:center;cursor:pointer;transition:var(--tr);background:var(--ppu)}

.ua:hover{border-color:var(--p);background:var(--pp)}

.ua .ui2{font-size:36px;margin-bottom:8px;opacity:.5}

.ua p{font-size:14px;color:var(--tm);margin-bottom:2px}

.ua small{font-size:11px;color:var(--tl)}



/\* Parsed Products \*/

.pp-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;background:var(--ppu);margin-bottom:5px;font-size:12px}

.pp-item .ppn{flex:1;font-weight:500}.pp-item .ppp{font-weight:700;color:var(--p)}



/\* Bulk Price \*/

.br{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;background:var(--ppu);margin-bottom:8px;flex-wrap:wrap}

.br label{font-size:12px;font-weight:600;min-width:120px;flex:1}

.br input{width:100px;padding:9px 10px;border:2px solid var(--pp);border-radius:8px;font-family:inherit;font-size:13px;text-align:center;transition:border-color .2s}

.br input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(186,107,130,.15)}

.bc{font-size:11px;color:var(--tl);font-weight:600}



/\* Image Modal \*/

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}

.mo.o{display:flex}

.mc{background:var(--w);border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:var(--shl);max-height:90vh;overflow-y:auto}

.mc h3{font-size:19px;font-weight:700;margin-bottom:16px;color:var(--pd)}

.mpr{width:100%;height:200px;border-radius:12px;background:var(--pp);margin-bottom:16px;display:none;object-fit:cover}

.mpr.v{display:block}

.fiw{border:2px dashed var(--pl);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:var(--tr);margin-bottom:16px}

.fiw:hover{border-color:var(--p);background:var(--ppu)}

.fa{display:flex;gap:8px;margin-top:18px}

.fa .btn{flex:1}



/\* Form Row \*/

.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

@media(max-width:500px){.frow{grid-template-columns:1fr}}



/\* Category Manager \*/

.cat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}

.cat-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;background:var(--ppu);border:1px solid transparent;transition:var(--tr)}

.cat-item:hover{border-color:var(--pl)}

.cat-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}

.cat-name{font-size:14px;font-weight:600;flex:1}

.cat-count{font-size:11px;color:var(--tl);margin-right:8px}

.cat-act{display:flex;gap:4px}



/\* Export Code \*/

.export-area{background:var(--ppu);border:1px solid var(--pp);border-radius:12px;padding:16px;margin-top:14px;position:relative}

.export-area textarea{width:100%;min-height:200px;border:none;background:transparent;font-family:'Courier New',monospace;font-size:11px;color:var(--td);resize:vertical;outline:none}

.export-area .copy-btn{position:absolute;top:8px;right:8px}



/\* Confirm Dialog \*/

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}

.confirm-overlay.o{display:flex}

.confirm-box{background:var(--w);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:var(--shl);text-align:center}

.confirm-box h4{font-size:18px;margin-bottom:8px;color:var(--pd)}

.confirm-box p{font-size:13px;color:var(--tm);margin-bottom:20px}

.confirm-actions{display:flex;gap:10px}

.confirm-actions .btn{flex:1}



/\* Image URL Input \*/

.img-url-input{display:flex;gap:8px;align-items:flex-start}

.img-url-input input{flex:1}

.img-url-input .btn{flex-shrink:0;padding:11px 16px}

.img-preview-small{width:100%;max-height:150px;object-fit:contain;border-radius:8px;margin-top:8px;display:none;background:var(--pp)}

.img-preview-small.v{display:block}



/\* Responsive \*/

@media(max-width:600px){

&#x20; .hdr-in{padding:10px 12px}

&#x20; .cart-btn .clabel{display:none}

&#x20; .hero{padding:36px 14px 28px}.hero h1{font-size:24px}

&#x20; .mn{padding:12px}

&#x20; .sh{padding:16px 14px}

&#x20; .ss{padding:14px}

&#x20; .cs{max-width:100vw}

&#x20; .wl{display:none}

&#x20; .br{flex-direction:column;align-items:stretch}

&#x20; .br label{min-width:auto}

&#x20; .br input{width:100%}

&#x20; .api{flex-wrap:wrap}

&#x20; .api-act{width:100%;justify-content:flex-end;margin-top:4px}

}



/\* Scrollbar \*/

::-webkit-scrollbar{width:6px}

::-webkit-scrollbar-track{background:transparent}

::-webkit-scrollbar-thumb{background:var(--pl);border-radius:3px}

::-webkit-scrollbar-thumb:hover{background:var(--p)}



/\* Empty state \*/

.empty-state{text-align:center;padding:40px 20px;color:var(--tl)}

.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}

.empty-state p{font-size:14px;margin-bottom:4px}

.empty-state small{font-size:12px}



/\* Stats \*/

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}

.stat-card{background:var(--ppu);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--pp)}

.stat-card .stat-num{font-size:28px;font-weight:800;color:var(--p)}

.stat-card .stat-label{font-size:11px;color:var(--tl);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}



/\* Subcat tags \*/

.subcat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

.subcat-tag{background:var(--pp);color:var(--pd);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}

</head>

            <div class="fg"><label>Categoría principal *</label><select id="prodCat"></select></div>
          </div>
          <div class="frow">
            <div class="fg"><label>Sub-categoría *</label><select id="prodSub"></select></div>
            <div class="fg"><label>Precio ($) *</label><input type="number" id="prodPrice" placeholder="38000"></div>

          <div class="fg">
            <label>Imagen del producto (URL externa)</label>

          <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">

            <button class="btn btn-s" onclick="resetForm()">↩️ Limpiar</button>

      <!-- SUPPLIER -->
      <div class="as" id="tabSupplier">

          <h3>📋 Importar desde Proveedor</h3>
          <p class="as2">Subí un archivo .txt o .csv. El sistema extraerá automáticamente nombre y precio.</p>
          <div style="background:var(--ppu);padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:12px;color:var(--tm)">
            📝 <strong>Formato esperado:</strong> Una línea por producto: <code style="background:var(--pp);padding:2px 6px;border-radius:4px">Nombre, Precio</code> (separados por coma, tab o punto y coma)
          </div>
          <div class="ua" onclick="document.getElementById('supplierFile').click()">
            <div class="ui2">📄</div>

&#x20; if (!input.files || !input.files\[0]) return;

&#x20; var reader = new FileReader();

&#x20; reader.onload = function(e) { parseSupplierText(e.target.result); };

&#x20; reader.readAsText(input.files\[0]);

}



function parseSupplierText(text) {

&#x20; supplierParsed = \[];

&#x20; var lines = text.split('\\n').filter(function(l) { return l.trim(); });



&#x20; for (var i = 0; i < lines.length; i++) {

&#x20;   var parts = lines\[i].split(',');

&#x20;   if (parts.length < 2) parts = lines\[i].split('\\t');

&#x20;   if (parts.length < 2) parts = lines\[i].split(';');

&#x20;   if (parts.length < 2) parts = lines\[i].split('|');

&#x20;   if (parts.length < 2) continue;



&#x20;   var name = parts\[0].trim();

&#x20;   var priceStr = parts\[parts.length - 1].trim().replace(/\[^\\d.,]/g, '').replace(/\\./g, '').replace(',', '.');

&#x20;   var price = parseFloat(priceStr);



&#x20;   if (name \&\& !isNaN(price) \&\& price > 0) {

&#x20;     supplierParsed.push({name: name, price: Math.round(price)});

&#x20;   }

&#x20; }



&#x20; renderParsedProducts();

}



function renderParsedProducts() {

&#x20; var container = document.getElementById('parsedProducts');

&#x20; var actions = document.getElementById('supplierActions');



&#x20; if (!supplierParsed.length) {

&#x20;   container.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><p>No se pudieron extraer productos</p><small>Verificá el formato del archivo</small></div>';

&#x20;   actions.style.display = 'none';

&#x20;   return;

&#x20; }



&#x20; var html = '<p style="font-size:12px;color:var(--tm);font-weight:600;margin-bottom:8px">📋 ' + supplierParsed.length + ' productos detectados:</p>';

&#x20; for (var i = 0; i < supplierParsed.length; i++) {

&#x20;   html += '<div class="pp-item"><span class="ppn">📦 ' + supplierParsed\[i].name + '</span><span class="ppp">' + fmt(supplierParsed\[i].price) + '</span></div>';

&#x20; }

&#x20; container.innerHTML = html;

&#x20; actions.style.display = 'flex';

}



function importSupplierProducts() {

&#x20; if (!supplierParsed.length) return;

&#x20; var imported = 0, skipped = 0;



&#x20; for (var i = 0; i < supplierParsed.length; i++) {

&#x20;   var sp = supplierParsed\[i];

&#x20;   var exists = products.find(function(p) { return p.name.toLowerCase() === sp.name.toLowerCase(); });

&#x20;   if (!exists) {

&#x20;     products.push({id: genId(), name: sp.name, cat: categories.length ? categories\[0].id : '', sub: categories.length \&\& categories\[0].subs.length ? categories\[0].subs\[0].id : '', price: sp.price, img: '', featured: false});

&#x20;     imported++;

&#x20;   } else { skipped++; }

&#x20; }



&#x20; saveProducts();

&#x20; clearSupplier();

&#x20; renderStats();

&#x20; showToast('✅ ' + imported + ' importados' + (skipped ? ' (' + skipped + ' duplicados)' : ''), 'su');

}



function clearSupplier() {

&#x20; supplierParsed = \[];

&#x20; document.getElementById('parsedProducts').innerHTML = '';

&#x20; document.getElementById('supplierActions').style.display = 'none';

&#x20; var fi = document.getElementById('supplierFile');

&#x20; if (fi) fi.value = '';

}



// ===== BULK PRICES =====

function renderBulkPrices() {

&#x20; var container = document.getElementById('bulkPriceList');

&#x20; if (!container) return;

&#x20; var html = '';



&#x20; for (var ci = 0; ci < categories.length; ci++) {

&#x20;   var cat = categories\[ci];

&#x20;   html += '<h4 style="font-size:15px;color:var(--pd);margin:16px 0 8px">' + cat.icon + ' ' + cat.name + '</h4>';



&#x20;   for (var si = 0; si < cat.subs.length; si++) {

&#x20;     var sub = cat.subs\[si];

&#x20;     var count = products.filter(function(p) { return p.cat === cat.id \&\& p.sub === sub.id; }).length;

&#x20;     var inputId = 'bulk\_' + cat.id + '\_' + sub.id;

&#x20;     html += '<div class="br">' +

&#x20;       '<label>' + sub.name + ' <small style="color:var(--tl)">(' + count + ')</small></label>' +

&#x20;       '<input type="number" id="' + inputId + '" placeholder="Precio">' +

&#x20;       '<span class="bc">ARS</span>' +

&#x20;       '</div>';

&#x20;   }

&#x20; }



&#x20; container.innerHTML = html;



&#x20; for (var ci2 = 0; ci2 < categories.length; ci2++) {

&#x20;   var cat2 = categories\[ci2];

&#x20;   for (var si2 = 0; si2 < cat2.subs.length; si2++) {

&#x20;     var sub2 = cat2.subs\[si2];

&#x20;     var inputId2 = 'bulk\_' + cat2.id + '\_' + sub2.id;

&#x20;     var el = document.getElementById(inputId2);

&#x20;     if (el) {

&#x20;       var sample = products.find(function(p) { return p.cat === cat2.id \&\& p.sub === sub2.id; });

&#x20;       if (sample) el.value = sample.price;

&#x20;     }

&#x20;   }

&#x20; }

}



function applyBulkPrices() {

&#x20; var updated = 0;



&#x20; for (var ci = 0; ci < categories.length; ci++) {

&#x20;   var cat = categories\[ci];

&#x20;   for (var si = 0; si < cat.subs.length; si++) {

&#x20;     var sub = cat.subs\[si];

&#x20;     var inputId = 'bulk\_' + cat.id + '\_' + sub.id;

&#x20;     var el = document.getElementById(inputId);

&#x20;     if (!el) continue;

&#x20;     var newPrice = parseInt(el.value);

&#x20;     if (!newPrice || newPrice <= 0) continue;



&#x20;     for (var pi = 0; pi < products.length; pi++) {

&#x20;       if (products\[pi].cat === cat.id \&\& products\[pi].sub === sub.id) {

&#x20;         products\[pi].price = newPrice;

&#x20;         updated++;

&#x20;       }

&#x20;     }

&#x20;   }

&#x20; }



&#x20; saveProducts();

&#x20; showToast('✅ ' + updated + ' precios actualizados', 'su');

}



// ===== EXPORT CODE =====

function generateExportCode() {

&#x20; var area = document.getElementById('exportArea');

&#x20; var textarea = document.getElementById('exportCode');



&#x20; var fullCode = JSON.stringify(products, null, 2);



&#x20; textarea.value = fullCode;

&#x20; area.style.display = 'block';

&#x20; showToast('📥 Código generado. Copialo y reemplazalo en tu HTML.', 'su');

}



function copyExportCode() {

&#x20; var textarea = document.getElementById('exportCode');

&#x20; textarea.select();

&#x20; textarea.setSelectionRange(0, 99999);



&#x20; try {

&#x20;   navigator.clipboard.writeText(textarea.value).then(function() {

&#x20;     showToast('📋 ¡Código copiado al portapapeles!', 'su');

&#x20;   });

&#x20; } catch(e) {

&#x20;   document.execCommand('copy');

&#x20;   showToast('📋 ¡Código copiado!', 'su');

&#x20; }

}



function downloadExportFile() {

&#x20; var data = JSON.stringify(products, null, 2);

&#x20; var blob = new Blob(\[data], {type: 'application/json'});

&#x20; var url = URL.createObjectURL(blob);

&#x20; var a = document.createElement('a');

&#x20; a.href = url;

&#x20; a.download = 'palmimport\_productos.json';

&#x20; document.body.appendChild(a);

&#x20; a.click();

&#x20; document.body.removeChild(a);

&#x20; URL.revokeObjectURL(url);

&#x20; showToast('💾 Archivo descargado', 'su');

}

&#x20; loadCategories();

&#x20; loadProducts();

&#x20; loadCart();

&#x20; renderCatalog();

&#x20; updateCartUI();

}

window.addEventListener('DOMContentLoaded', function() {
