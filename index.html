<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Eco-Friendly Place - Interactive Leaflet</title>
    <style>
        :root {
            --bg-canvas: #0f172a;
            --paper-sheet: #ffffff;
            --shadow-color: rgba(15, 23, 42, 0.08);
            
            /* High-Quality Design Palette */
            --house-yellow: #fef08a;
            --house-yellow-dark: #fde047;
            --roof-red: #f87171;
            --roof-red-dark: #ef4444;
            --door-brown: #92400e;
            --pipe-blue: #3b82f6;
            --text-green: #16a34a;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-canvas);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 2500px;
        }

        /* Sleek Control Interface */
        .controls-bar {
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .action-btn {
            background-color: #ffffff;
            color: #0f172a;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.15);
            background-color: #f8fafc;
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        /* 3D Leaflet Geometry Box */
        .leaflet-box {
            width: 900px;
            height: 550px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            border-radius: 8px;
            transition: transform 0.5s ease;
        }

        /* Clean White Cardstock Panels */
        .fold-panel {
            width: 300px;
            height: 100%;
            position: absolute;
            top: 0;
            background-color: var(--paper-sheet);
            box-shadow: inset 0 0 20px var(--shadow-color);
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fold-panel.left-segment {
            left: 0;
            transform-origin: right center;
            z-index: 5;
            border-right: 1px solid rgba(0,0,0,0.05);
            border-radius: 8px 0 0 8px;
        }

        .fold-panel.center-segment {
            left: 300px;
            z-index: 1;
        }

        .fold-panel.right-segment {
            left: 600px;
            transform-origin: left center;
            z-index: 6;
            border-left: 1px solid rgba(0,0,0,0.05);
            border-radius: 0 8px 8px 0;
        }

        /* 3D Kinetic Folds */
        .leaflet-box.is-closed .left-segment {
            transform: rotateY(180deg);
            z-index: 15;
        }

        .leaflet-box.is-closed .right-segment {
            transform: rotateY(-180deg);
            z-index: 16;
        }

        /* Dynamic Visibility Mapping Layers */
        .face-view {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            padding: 50px 35px;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            box-sizing: border-box;
        }

        /* Flaps Flip Corrections */
        .left-segment .face-view.front-cover {
            transform: rotateY(180deg);
        }

        .right-segment .face-view.front-cover {
            transform: rotateY(-180deg);
        }

        /* FIX: Absolute zero bleed-through rule */
        .leaflet-box.is-closed .face-view.inside-spread {
            opacity: 0 !important;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .leaflet-box:not(.is-closed) .face-view.front-cover {
            opacity: 0 !important;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        /* Premium Minimal Typography Layouts */
        .text-title {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 2.4rem;
            color: var(--text-dark);
            line-height: 1.2;
            font-weight: 700;
        }

        .text-accent {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 3.8rem;
            color: var(--text-green);
            font-weight: 800;
            margin: 5px 0;
        }

        .text-annotation {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 1.2rem;
            color: #14532d;
            line-height: 1.5;
            font-weight: 700;
        }

        /* Premium Graphic Vector Layer Placement */
        .master-svg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 900px;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="controls-bar">
        <button class="action-btn" onclick="openBrochure()">Unfold Open View</button>
        <button class="action-btn" onclick="closeBrochure()">Fold Closed Cover</button>

        <div class="fold-panel left-segment">

                <div class="text-title" style="font-size: 3rem; margin-bottom: 5px;">An</div>
                <div class="text-accent" style="font-size: 3.2rem; color: var(--text-dark);">eco-friendly</div>

        <svg class="master-svg-canvas" id="houseVectorLayer" viewBox="0 0 900 550">

                <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#bae6fd" />
                    <stop offset="100%" stop-color="#38bdf8" />
                </linearGradient>
                <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
                </filter>
            </defs>

            <g filter="url(#dropShadow)">
                <path d="M 335,75 c -8,0 -15,-6 -15,-14 0,-10 9,-18 20,-17 3,-10 13,-18 25,-16 9,-11 26,-11 34,1 6,-4 15,-3 20,3 7,-1 14,4 14,12 0,9 -7,15 -16,15 z" fill="url(#cloudGrad)" stroke="#0284c7" stroke-width="2" />
            </g>
            
            <g stroke="var(--pipe-blue)" stroke-width="3" stroke-linecap="round">
                <line x1="355" y1="90" x2="355" y2="102" stroke-dasharray="4,4" />
                <line x1="380" y1="92" x2="380" y2="106" stroke-dasharray="4,4" />
                <line x1="405" y1="90" x2="405" y2="102" stroke-dasharray="4,4" />
            </g>

            <polygon points="100,180 275,115 450,180" fill="url(#roofGrad)" stroke="#b91c1c" stroke-width="2.5" stroke-linejoin="round" filter="url(#dropShadow)" />
            <polygon points="450,180 545,115 545,180" fill="none" stroke="#b91c1c" stroke-width="2.5" stroke-linejoin="roí d" />
            
            <g stroke="#1e293b" stroke-width="2" fill="rgba(255,255,255,0.4)" stroke-linejoin="round">
                <rect x="295" y="128" width="55" height="32" transform="rotate(11, 295, 128)" />
                <line x1="324" y1="130" x2="330" y2="161" />

            <rect x="155" y="315" width="85" height="135" fill="var(--door-brown)" stroke="#451a03" stroke-width="2" rx="4" />

            <rect x="290" y="180" width="255" height="270" fill="#f8fafc" stroke="#475569" stroke-width="2.5" />
            <line x1="415" y1="180" x2="415" y2="450" stroke="#cbd5e1" stroke-width="2" />
            
            <line x1="50" y1="450" x2="680" y2="450" stroke="#334155" stroke-width="4" stroke-linecap="round" />

            <g fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M385,165 L405,165 L405,200 L555,200 L555,475" stroke="var(--pipe-blue)" stroke-width="12" />
                <path d="M385,165 L405,165 L405,200 L555,200 L555,475" stroke="#1d4ed8" stroke-width="2.5" />

                <path d="M555,475 L390,475" stroke="var(--pipe-blue)" stroke-width="12" />

                <path d="M390,475 L390,425 L340,425 L340,365" stroke="var(--pipe-blue)" stroke-width="12" />
                <path d="M390,475 L390,425 L340,425 L340,365" stroke="#1d4ed8" stroke-width="2.5" />

                <path d="M465,475 L465,425" stroke="var(--pipe-blue)" stroke-width="12" />
                <path d="M465,475 L465,425" stroke="#1d4ed8" stroke-width="2.5" />
            </g>

            <g fill="none" stroke="#1e293b" stroke-width="2" stroke-linejoin="round">
                <rect x="300" y="365" width="85" height="45" fill="#ffffff" />
                <path d="M315,365 L315,342 c 0,-8 12,-8 12,0" stroke-linecap="round" /> 
                <line x1="342" y1="365" x2="342" y2="410" stroke="#cbd5e1" />
                <circle cx="328" cy="388" r="4" fill="#e2e8f0" />
                <circle cx="356" cy="388" r="4" fill="#e2e8f0" />
            </g>

            <g fill="none" stroke="#1e293b" stroke-width="2" stroke-linejoin="round">
                <rect x="430" y="325" width="24" height="42" fill="#ffffff" rx="2" /> 
                <ellipse cx="488" cy="368" rx="18" ry="12" fill="#ffffff" /> 
                <rect x="454" y="354" width="22" height="14" fill="#ffffff" />
                <ellipse cx="488" cy="368" rx="10" ry="5" fill="#93c5fd" stroke="var(--pipe-blue)" />
            </g>

            <g fill="none" stroke="var(--text-green)" stroke-width="2.5" stroke-linecap="round">
                <path d="M555,195 L615,120" />
                <polygon points="615,120 606,122 612,128" fill="var(--text-green)" />

                <path d="M510,475 L615,445" />
                <polygon points="615,445 606,443 610,451" fill="var(--text-green)" />
            </g>
        </svg>

    </div>

    <script>
        const leafletStructure = document.getElementById('leafletStructure');
        const houseVectorLayer = document.getElementById('houseVectorLayer');

        function openBrochure() {
            leafletStructure.classList.remove('is-closed');
            houseVectorLayer.style.opacity = "1";
        }

        function closeBrochure() {
            leafletStructure.classList.add('is-closed');
            houseVectorLayer.style.opacity = "0";
        }

        // Initialize state defaults
        houseVectorLayer.style.opacity = "0";
    </script>
</body>
</html>
